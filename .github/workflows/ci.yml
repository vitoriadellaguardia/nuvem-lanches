# Configuração para o Backend
      - name: Instalar dependências (Backend)
        working-directory: ./server
        run: npm install

      - name: Rodar Testes (Backend)
        working-directory: ./server
        # O "|| true" garante que o pipeline continue mesmo se o teste falhar ou não existir
        run: npm test --if-present || true

      # Configuração para o Frontend
      - name: Instalar dependências (Frontend)
        working-directory: ./client
        run: npm install

      - name: Rodar Testes (Frontend)
        working-directory: ./client
        run: npm test --if-present || true
        
      # DICA EXTRA: Adicione um passo de Build no Front para garantir que o deploy vai dar certo
      - name: Build Frontend
        working-directory: ./client
        run: npm run build